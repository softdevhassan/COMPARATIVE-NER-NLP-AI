name: Deploy Comparative NER to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test SSH Connection
        run: |
          echo "Testing connectivity to ${{ secrets.SSH_HOST }} on port 22..."
          nc -zv -w 5 ${{ secrets.SSH_HOST }} 22

      - name: Deploy via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/deploy_key
          chmod 600 ~/deploy_key
          
          # Use rsync with explicit SSH options for better debugging and reliability
          rsync -avz --delete -vv \
            -e "ssh -i ~/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10" \
            --exclude='.env' --exclude='ner' --exclude='.git' --exclude='.github' --exclude='__pycache__' --exclude='*.pyc' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/html/ner.orbin.dev/
          
          rm ~/deploy_key

      - name: Post-deployment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/html/ner.orbin.dev

            python3 -m venv ner
            source ner/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt

            sudo systemctl restart ner-flask
